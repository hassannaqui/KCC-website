<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KCC - Kabristan Cricket Council</title>

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:linear-gradient(135deg,#0f0f0f,#1a1a1a,#000);
color:white;
overflow-x:hidden;
}

/* Hero Section */
.hero{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
}

.hero h1{
font-size:70px;
font-weight:800;
background:linear-gradient(90deg,#00ffcc,#00ccff,#ff00cc);
-webkit-background-clip:text;
color:transparent;
}

.hero h2{
font-size:22px;
margin-top:15px;
color:#ccc;
}

.hero p{
margin-top:10px;
font-size:18px;
color:#888;
}

/* Button */
.btn{
margin-top:30px;
padding:15px 35px;
border:none;
border-radius:30px;
background:linear-gradient(90deg,#00ffcc,#00ccff);
color:black;
font-size:18px;
font-weight:600;
cursor:pointer;
transition:0.3s;
}

.btn:hover{
transform:scale(1.1);
box-shadow:0 0 20px #00ffcc;
}

/* Section */
.section{
padding:80px 20px;
text-align:center;
}

.section h2{
font-size:40px;
margin-bottom:30px;
color:#00ffcc;
}

.card-container{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:30px;
}

.card{
background:rgba(255,255,255,0.05);
backdrop-filter:blur(10px);
padding:30px;
width:280px;
border-radius:20px;
transition:0.3s;
border:1px solid rgba(255,255,255,0.1);
}

.card:hover{
transform:translateY(-10px);
box-shadow:0 0 25px #00ffcc;
}

.card h3{
font-size:22px;
margin-bottom:10px;
color:#00ccff;
}

footer{
text-align:center;
padding:20px;
background:#000;
color:#777;
}
</style>
</head>

<body>

<div class="hero">
<h1>KCC</h1>
<h2>KABRISTAN CRICKET COUNCIL</h2>
<p>Made by HASAN (HONORABLE CHAIRMAN)</p>
<button class="btn">Enter the Arena</button>
</div>

<div class="section">
<h2>Upcoming Events</h2>
<div class="card-container">
<div class="card">
<h3>Inaugural Match</h3>
<p>Match starts at 16:15 sharp. Be ready!</p>
</div>
<div class="card">
<h3>Tournament 2026</h3>
<p>Registrations opening soon.</p>
</div>
<div class="card">
<h3>KCC League</h3>
<p>Where legends are born.</p>
</div>
</div>
</div>

<footer>
© 2026 Kabristan Cricket Council | All Rights Reserved
</footer>

</body>
</html>
